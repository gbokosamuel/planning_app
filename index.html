<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Planning de défis pour Samuel — Track Data, Track Créatif, Langues. Basé sur les méthodes Kaggle Grandmaster, Beeple et Pratique Délibérée.">
  <meta name="theme-color" content="#0D1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Samuel — Planning de Défis</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/cockpit.css">
  <link rel="stylesheet" href="css/sprint.css">
  <link rel="stylesheet" href="css/progression.css">
  
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; top:0; left:0; z-index:9999;">' + 
        '<h3>JavaScript Error</h3>' +
        '<p><b>Message:</b> ' + message + '</p>' +
        '<p><b>Source:</b> ' + source + ':' + lineno + ':' + colno + '</p>' +
        '<p><b>Stack:</b> <pre>' + (error && error.stack ? error.stack : '') + '</pre></p>' +
        '</div>';
    };
  </script>
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
  <!-- App Container -->
  <div id="app">
    <!-- Views (only one visible at a time) -->
    <div class="view" id="view-cockpit"></div>
    <div class="view" id="view-sprint"></div>
    <div class="view" id="view-progression"></div>
    <div class="view" id="view-onboarding"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav-bottom" id="main-nav"></nav>

  <!-- Scripts (order matters: utils first, then data/state, then features, then views, then app) -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/xp.js"></script>
  <script src="js/cockpit.js"></script>
  <script src="js/sprint.js"></script>
  <script src="js/progression.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
